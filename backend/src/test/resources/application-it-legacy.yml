# Rung-4 registry: the legacy compose profile (Flowable 6.3.1 on :8084) — the engine
# that really LACKS the ARCH §2.5 capabilities the probe must gate.
inspector:
  fanout-parallelism: 4
  engines:
    - id: engine-legacy
      name: "Engine Legacy (harness)"
      base-url: "http://localhost:8084/flowable-rest/service"
      environment: dev
      accent-color: "#7f8c8d"
      enabled: true
      mode: read-only
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_LEGACY_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 50

# M4: this profile is docker-free / engine-only — the BFF Postgres is NOT part of the
# context. DB autoconfig is excluded (repository beans are provided as mocks via
# io.inspector.support.NoDbTestSupport); the real-schema path (Flyway + ddl-auto=validate)
# is proven by the Testcontainers-backed *IT suite (it-actions profile).
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
