# Rung-4 registry: the REAL engine-a from docker/docker-compose.dev.yml.
# A profile-specific file replaces the whole engines list — no bleed-through of
# engine-b/engine-7 from the main application.yml.
inspector:
  # Registry CRUD off in tests: config-pinned so the boot seeder is inert (RegistryBootstrap
  # no-ops; existing suites unperturbed). The seed/drift path is proven by EngineRegistryStoreIT.
  registry:
    source: config
  # v2/M4 snapshot sampler OFF — this profile is docker-free (no DB / JdbcTemplate).
  snapshot:
    enabled: false
  # R-BAU-10 incident ledger OFF too — same reason (no ledger store in this profile).
  incidents:
    enabled: false
  audit:
    partition-maintenance:
      enabled: false
  fanout-parallelism: 4
  engines:
    - id: engine-a
      name: "Engine A (harness)"
      base-url: "http://localhost:${PI_ENGINE_A_PORT:8081}/flowable-rest/service"
      environment: dev
      accent-color: "#2e86de"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 50

# M4: this profile is docker-free / engine-only — the BFF Postgres is NOT part of the
# context. DB autoconfig is excluded (repository beans are provided as mocks via
# io.inspector.support.NoDbTestSupport); the real-schema path (Flyway + ddl-auto=validate)
# is proven by the Testcontainers-backed *IT suite (it-actions profile).
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
