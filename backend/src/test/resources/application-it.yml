# Rung-4 registry: the REAL engine-a from docker/docker-compose.dev.yml.
# A profile-specific file replaces the whole engines list — no bleed-through of
# engine-b/engine-7 from the main application.yml.
inspector:
  fanout-parallelism: 4
  engines:
    - id: engine-a
      name: "Engine A (harness)"
      base-url: "http://localhost:8081/flowable-rest/service"
      environment: dev
      accent-color: "#2e86de"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 50
