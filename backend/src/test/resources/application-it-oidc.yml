# Rung-4 OIDC profile: the REAL oidc chain (application-oidc.yml) against a REAL Keycloak +
# a Testcontainers Postgres. The oidc client registration values (issuer-uri, client-id,
# secret) are injected via @DynamicPropertySource in OidcKeycloakIT so application-oidc.yml's
# env placeholders are all satisfied — proving that config parses and the chain boots against a
# genuine issuer. Snapshot sampler + registry seeding off (no engines needed for the auth path).
inspector:
  security:
    # The env-bootstrap apex floor — satisfies the ≥1-ACCESS_ADMIN boot invariant (S3) under the
    # oidc profile. A real deploy sets INSPECTOR_ACCESS_ADMIN_GROUP; here it's a realm group.
    mapping:
      access-admin-group: flowable-admins
    # Break-glass on for the IT (the password is injected via @DynamicPropertySource as an env ref).
    break-glass:
      enabled: true
      username: break-glass
      session-cap-hours: 4
  snapshot:
    enabled: false
  # R-BAU-10 incident ledger OFF too — same reason (no ledger store in this profile).
  incidents:
    enabled: false
  registry:
    source: config
  engines:
    - id: engine-a
      name: "Engine A (inert)"
      base-url: "http://localhost:${PI_ENGINE_A_PORT:8081}/flowable-rest/service"
      environment: dev
      accent-color: "#2e86de"
      enabled: false
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 500
