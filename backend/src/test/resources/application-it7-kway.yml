# Rung-4 registry for the v2 k-way-merge deep-paging ITs on Flowable 7.1 (engine-7 on :8083).
# Cross-version sibling of application-it-kway.yml — same fixtures, the Jakarta 7.1 wire.
inspector:
  registry:
    source: config
  snapshot:
    enabled: false
  # R-BAU-10 incident ledger OFF too — same reason (no ledger store in this profile).
  incidents:
    enabled: false
  audit:
    partition-maintenance:
      enabled: false
  fanout-parallelism: 4
  hierarchy-max-depth: 10
  engines:
    - id: kway7-scroll
      name: "K-way scroll 7.1 (default depth cap)"
      base-url: "http://localhost:${PI_ENGINE_7_PORT:8083}/flowable-rest/service"
      environment: dev
      accent-color: "#2e86de"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 2
    - id: kway7-capped
      name: "K-way capped 7.1 (deep-paging-max-depth 6)"
      base-url: "http://localhost:${PI_ENGINE_7_PORT:8083}/flowable-rest/service"
      environment: dev
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 3
      deep-paging-max-depth: 6
    - id: kway7-down
      name: "Unreachable engine (drop-mid-scroll fixture)"
      base-url: "http://localhost:59997/flowable-rest/service"
      environment: dev
      enabled: true
      mode: read-only
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 500
        read-ms: 1000
        write-ms: 1000
      max-page-size: 2

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
