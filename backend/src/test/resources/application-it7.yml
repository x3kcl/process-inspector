# Rung-4 registry: the flowable-7 compose profile (Flowable 7.1 on :8083).
# dlq-scan-cap 500 (not the truncation-sized 50): Search7IT filters by businessKey, which
# is NOT pushed down to the job-lane scan — on the KEEP-up stack, accumulated dead-letter
# residue past the cap truncates the fresh test instances out of the member list.
inspector:
  # Registry CRUD off in tests: config-pinned so the boot seeder is inert (RegistryBootstrap
  # no-ops; existing suites unperturbed). The seed/drift path is proven by EngineRegistryStoreIT.
  registry:
    source: config
  # v2/M4 snapshot sampler OFF — this profile is docker-free (no DB / JdbcTemplate).
  snapshot:
    enabled: false
  fanout-parallelism: 4
  engines:
    - id: engine-7
      name: "Engine 7 (harness)"
      base-url: "http://localhost:8083/flowable-rest/service"
      environment: dev
      accent-color: "#8e44ad"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 500

# M4: this profile is docker-free / engine-only — the BFF Postgres is NOT part of the
# context. DB autoconfig is excluded (repository beans are provided as mocks via
# io.inspector.support.NoDbTestSupport); the real-schema path (Flyway + ddl-auto=validate)
# is proven by the Testcontainers-backed *IT suite (it-actions profile).
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
