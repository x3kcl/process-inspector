# Rung-4 registry for the M2a search-join ITs (flowable-6 profile, engine-a on :8081).
#
# Three registrations, one real engine (the sanctioned same-engine-twice trick,
# engine-harness skill):
#   engine-a    — the plans under test (cap 50 / page 10, TEST-STRATEGY §9)
#   engine-tiny — SAME engine with dlq-scan-cap 2: guarantees a truncated scan without
#                 seeding thousands of jobs; the envelope must badge, never lie
#   engine-down — nothing listens there: the partial-results contract (perEngine.ok=false
#                 inside a 200, rows from healthy engines intact)
inspector:
  # Registry CRUD off in tests: config-pinned so the boot seeder is inert (RegistryBootstrap
  # no-ops; existing suites unperturbed). The seed/drift path is proven by EngineRegistryStoreIT.
  registry:
    source: config
  # v2/M4 snapshot sampler OFF — this profile is docker-free (no DB / JdbcTemplate).
  snapshot:
    enabled: false
  audit:
    partition-maintenance:
      enabled: false
  fanout-parallelism: 4
  hierarchy-max-depth: 10
  engines:
    - id: engine-a
      name: "Engine A (harness)"
      base-url: "http://localhost:${PI_ENGINE_A_PORT:8081}/flowable-rest/service"
      environment: dev
      accent-color: "#2e86de"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      # TS-DET-12 fixture: vitals must render this template into telemetryUrl with the
      # placeholder VALUES url-encoded; engine-tiny has no template → no field.
      telemetry-url-template: "https://logs.example/discover?pi={processInstanceId}&bk={businessKey}&t={failureTime}"
      max-page-size: 10
      # Generous headroom: the dev engine accumulates dead-letter jobs across local runs,
      # and a truncated engine-a scan would flake the roll-up assertions. Truncation is
      # tested deterministically on engine-tiny, never here.
      dlq-scan-cap: 500
    - id: engine-tiny
      name: "Engine A again, capped tiny (truncation fixture)"
      base-url: "http://localhost:${PI_ENGINE_A_PORT:8081}/flowable-rest/service"
      environment: dev
      enabled: true
      mode: read-only
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 2
      dlq-scan-cap: 2
    - id: engine-down
      name: "Unreachable engine (degradation fixture)"
      base-url: "http://localhost:59999/flowable-rest/service"
      environment: dev
      enabled: true
      mode: read-only
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 500
        read-ms: 1000
        write-ms: 1000
      max-page-size: 10
      dlq-scan-cap: 50

# M4: this profile is docker-free / engine-only — the BFF Postgres is NOT part of the
# context. DB autoconfig is excluded (repository beans are provided as mocks via
# io.inspector.support.NoDbTestSupport); the real-schema path (Flyway + ddl-auto=validate)
# is proven by the Testcontainers-backed *IT suite (it-actions profile).
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
