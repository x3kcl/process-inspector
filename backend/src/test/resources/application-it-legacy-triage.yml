# Rung-4 registry for TriageLegacyIT (Flowable 6.3.1 on :8084 — the pre-cliff engine).
# dlq-scan-cap 500: this suite asserts per-version group counts that a truncation-sized
# cap could drop as the dev engine accumulates failures across local runs.
inspector:
  fanout-parallelism: 4
  engines:
    - id: engine-legacy
      name: "Engine Legacy (triage harness)"
      base-url: "http://localhost:8084/flowable-rest/service"
      environment: dev
      accent-color: "#7f8c8d"
      enabled: true
      mode: read-only
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_LEGACY_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 500
