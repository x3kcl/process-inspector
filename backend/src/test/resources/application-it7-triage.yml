# Rung-4 registry for Triage7IT (Flowable 7.1 on :8083). dlq-scan-cap 500: this suite
# asserts per-version group counts that a truncation-sized cap could drop as the dev
# engine accumulates failures across local runs.
inspector:
  fanout-parallelism: 4
  engines:
    - id: engine-7
      name: "Engine 7 (triage harness)"
      base-url: "http://localhost:8083/flowable-rest/service"
      environment: dev
      accent-color: "#8e44ad"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 10
      dlq-scan-cap: 500
