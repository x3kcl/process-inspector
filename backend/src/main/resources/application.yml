server:
  port: 8085

spring:
  threads:
    virtual:
      enabled: true   # SPEC §10: blocking style on virtual threads, no WebFlux

  # M4: the BFF-owned Postgres (audit log, notes, protected instances) — the compose
  # `postgres` profile on :5433 for dev. Password via env ref only (iron rule); the
  # default matches the dev compose container.
  datasource:
    url: ${INSPECTOR_DB_URL:jdbc:postgresql://localhost:5433/inspector}
    username: ${INSPECTOR_DB_USER:inspector}
    password: ${INSPECTOR_DB_PASSWORD:inspector}
    hikari:
      # OPERATIONS §6: pool sized explicitly. connection-timeout kept short so the
      # fail-closed audit refusal (R-AUD-01) answers in seconds, not Hikari's 30s default.
      maximum-pool-size: 20
      connection-timeout: 3000
  jpa:
    # Schema comes from Flyway ONLY (V1__init.sql) — validate in EVERY profile.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      # audit_entry is a partitioned table; without this the validator does not see
      # PG "PARTITIONED TABLE" relations and validate would fail on a correct schema.
      hibernate.hbm2ddl.extra_physical_table_types: PARTITIONED TABLE

# R-SEM-15: deterministic OpenAPI output — sorted keys + stable pretty-printing so the
# committed frontend/src/api/schema.d.ts only diffs when the API surface changes.
springdoc:
  writer-with-order-by-keys: true
  writer-with-default-pretty-printer: true

# Shared circuit-breaker config; the client creates one instance PER ENGINE ID so a sick
# engine fast-fails alone (do-no-harm, ARCHITECTURE §2.2). wait-duration < probe period
# (30s) so the scheduled health probe drives half-open recovery.
resilience4j:
  circuitbreaker:
    configs:
      engine:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          # Capability probes expect 404s on old engines — they must never trip a breaker.
          - org.springframework.web.client.HttpClientErrorException
  # Do-no-harm companion to the breaker (ARCH §2.2): caps concurrent in-flight calls PER
  # ENGINE so the search plans' parallel enrichment legs queue instead of flooding an
  # engine that is typically already under load when this tool is open.
  bulkhead:
    configs:
      engine:
        max-concurrent-calls: 8
        max-wait-duration: 20s

inspector:
  # At most this many engines searched concurrently per fan-out (R-NFR-01 caps at 10).
  fanout-parallelism: 8
  # superProcessInstanceId chain-walk bound for the failed-in-subprocess roll-up (ARCH §2.3).
  hierarchy-max-depth: 10
  # Stage 0 triage landing (SPEC §4): aggregation cache TTL (thundering-herd protection),
  # Refresh-bypass throttle, and the cap on representative stacktrace fetches per round.
  triage:
    cache-ttl-s: 20
    refresh-min-interval-s: 10
    stacktrace-sample-cap: 25
  engines:
    - id: engine-a
      name: "Engine A (demo)"
      base-url: "http://localhost:8081/flowable-rest/service"
      environment: dev
      accent-color: "#2e86de"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 200
      dlq-scan-cap: 5000
      alarm-thresholds:
        oldest-job-warn-min: 5
        oldest-job-crit-min: 15
        overdue-timer-grace-s: 60

    - id: engine-b
      name: "Engine B (demo)"
      base-url: "http://localhost:8082/flowable-rest/service"
      environment: dev
      accent-color: "#10ac84"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_B_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 200
      dlq-scan-cap: 5000
      alarm-thresholds:
        oldest-job-warn-min: 5
        oldest-job-crit-min: 15
        overdue-timer-grace-s: 60

    # Flowable 7 engine from the flowable-7 compose profile; flip enabled when it runs.
    - id: engine-7
      name: "Engine 7 (Flowable 7.x)"
      base-url: "http://localhost:8083/flowable-rest/service"
      environment: dev
      accent-color: "#8e44ad"
      enabled: false
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 200
      dlq-scan-cap: 5000
