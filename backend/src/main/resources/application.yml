server:
  port: 8085
  servlet:
    session:
      # Idle cap (R-SAFE-07): a session dies after 12h of inactivity. The ABSOLUTE cap (24h,
      # regardless of activity) is AbsoluteSessionTimeoutFilter — see inspector.security.http.
      timeout: 12h
      cookie:
        http-only: true
        same-site: lax
        # `secure` deliberately left container-derived: Secure over HTTPS (prod behind the proxy),
        # not on plain-HTTP local dev — hard-coding true would break the dev login over http.

spring:
  threads:
    virtual:
      enabled: true   # SPEC §10: blocking style on virtual threads, no WebFlux

  # M4: the BFF-owned Postgres (audit log, notes, protected instances) — the compose
  # `postgres` profile on :5433 for dev. Password via env ref only (iron rule); the
  # default matches the dev compose container.
  datasource:
    url: ${INSPECTOR_DB_URL:jdbc:postgresql://localhost:5433/inspector}
    username: ${INSPECTOR_DB_USER:inspector}
    password: ${INSPECTOR_DB_PASSWORD:inspector}
    hikari:
      # OPERATIONS §6: pool sized explicitly. connection-timeout kept short so the
      # fail-closed audit refusal (R-AUD-01) answers in seconds, not Hikari's 30s default.
      maximum-pool-size: 20
      connection-timeout: 3000
  jpa:
    # Schema comes from Flyway ONLY (V1__init.sql) — validate in EVERY profile.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      # audit_entry is a partitioned table; without this the validator does not see
      # PG "PARTITIONED TABLE" relations and validate would fail on a correct schema.
      hibernate.hbm2ddl.extra_physical_table_types: PARTITIONED TABLE

# R-SEM-15: deterministic OpenAPI output — sorted keys + stable pretty-printing so the
# committed frontend/src/api/schema.d.ts only diffs when the API surface changes.
springdoc:
  writer-with-order-by-keys: true
  writer-with-default-pretty-printer: true

# Shared circuit-breaker config; the client creates one instance PER ENGINE ID so a sick
# engine fast-fails alone (do-no-harm, ARCHITECTURE §2.2). wait-duration < probe period
# (30s) so the scheduled health probe drives half-open recovery.
resilience4j:
  circuitbreaker:
    configs:
      engine:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          # Capability probes expect 404s on old engines — they must never trip a breaker.
          - org.springframework.web.client.HttpClientErrorException
      # v2/M4 snapshot sampler's OWN breaker (instances keyed "{id}:sampler") so a failing
      # background poll trips independently of the interactive breaker — same failure model.
      sampler:
        base-config: engine
      # v2 deep-paging's OWN breaker (instances keyed "{id}:deep-page", R-NFR-08): an
      # offset-near-cap query failing/timing out trips independently of interactive search.
      deep-page:
        base-config: engine
  # Do-no-harm companion to the breaker (ARCH §2.2): caps concurrent in-flight calls PER
  # ENGINE so the search plans' parallel enrichment legs queue instead of flooding an
  # engine that is typically already under load when this tool is open.
  bulkhead:
    configs:
      engine:
        max-concurrent-calls: 8
        max-wait-duration: 20s
      # The v2/M4 snapshot sampler's THIN lane (PLAN v2/M4): a periodic trend poll gets its
      # own small per-engine permit share so it can never starve an interactive search of the
      # 8 interactive permits. Short wait — a contended sample is skipped, not queued long.
      sampler:
        max-concurrent-calls: 2
        max-wait-duration: 5s
      # v2 deep-paging's THIN lane (R-NFR-08): a heavy offset-near-cap fan-out gets its own small
      # per-engine permit share so a scroller (or a crafted-cursor flood) can never starve the 8
      # interactive permits. Short wait — a contended deep page degrades, never queues long.
      deep-page:
        max-concurrent-calls: 2
        max-wait-duration: 5s

inspector:
  # Transport/header/session posture (IDP-SECURITY.md §8, R-OPS-16). All defaults are safe; shown
  # here for legibility. CSP ships REPORT-ONLY first — flip csp-report-only:false per deploy once
  # tuned against the real bpmn-js/AG-Grid/CodeMirror bundle. HSTS stays OFF (the proxy owns it —
  # never double-emit Strict-Transport-Security).
  security:
    http:
      csp-report-only: true
      hsts-enabled: false
      session-absolute-cap-hours: 24
  # At most this many engines searched concurrently per fan-out (R-NFR-01 caps at 10).
  fanout-parallelism: 8
  # superProcessInstanceId chain-walk bound for the failed-in-subprocess roll-up (ARCH §2.3).
  hierarchy-max-depth: 10
  # Stage 0 triage landing (SPEC §4): aggregation cache TTL (thundering-herd protection),
  # Refresh-bypass throttle, and the cap on representative stacktrace fetches per round.
  triage:
    cache-ttl-s: 20
    refresh-min-interval-s: 10
    stacktrace-sample-cap: 25
  # v2/M4 job-lane snapshot store (R-BAU-08 trend sparklines): an @Scheduled virtual-thread
  # sampler runs the Stage-0 count aggregation on the thin `sampler` bulkhead and upserts one
  # narrow row per (engine, lane) bucket into triage_snapshot. The UI reads history from
  # Postgres, never the live engine. bucket-width ≥ sample-interval so a normal (non-overlapping)
  # fire always lands in a fresh bucket; a restart/overlap within a bucket upserts idempotently.
  snapshot:
    enabled: true
    sample-interval: 60s
    bucket-width: 60s
    retention-days: 400
  # Audit golden-master retention (M4-CLOSEOUT §A2 / S5b). retention-days MUST be ≥ 400 — the
  # purge_audit() DB floor refuses any younger cutoff, so a smaller value would never purge.
  # The @Scheduled AuditRetentionPurger drops whole aged-out monthly partitions (one at a time,
  # each chain-checkpointed and audited BEFORE the DROP); disable it with retention-purge.enabled:
  # false (a STOPPED purge is then visible via the missing audit-retention-purge event).
  audit:
    retention-days: 400
    retention-purge:
      enabled: true
  # v2 Registry CRUD (docs/REGISTRY-CRUD.md). source=db (default): DB-authoritative once seeded —
  # an empty engine_registry imports `engines` below as a one-time audited seed, then the DB wins
  # (YAML drift is reported at boot, never silent). source=config pins to config-only (CRUD off,
  # restart semantics). egress-allowlist/egress-ports are the SSRF egress boundary — DEPLOY CONFIG,
  # never editable in-app — consumed by the URL validator when the write/connect path is wired
  # (S3/S4). Dev lists localhost so the demo engines below validate; prod sets a strict list
  # out-of-band and NEVER lists private ranges.
  registry:
    source: db
    egress-allowlist:
      - localhost
      - 127.0.0.0/8
    egress-ports: []
  engines:
    - id: engine-a
      name: "Engine A (demo)"
      # Placeholder-with-default so a container deployment can repoint the host without
      # replacing the whole engines list (indexed env binding would wipe the other fields).
      base-url: "${INSPECTOR_ENGINE_A_BASE_URL:http://localhost:8081/flowable-rest/service}"
      environment: dev
      accent-color: "#2e86de"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_A_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 200
      dlq-scan-cap: 5000
      alarm-thresholds:
        oldest-job-warn-min: 5
        oldest-job-crit-min: 15
        overdue-timer-grace-s: 60

    - id: engine-b
      name: "Engine B (demo)"
      base-url: "${INSPECTOR_ENGINE_B_BASE_URL:http://localhost:8082/flowable-rest/service}"
      environment: dev
      accent-color: "#10ac84"
      enabled: true
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_B_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 200
      dlq-scan-cap: 5000
      alarm-thresholds:
        oldest-job-warn-min: 5
        oldest-job-crit-min: 15
        overdue-timer-grace-s: 60

    # Flowable 7 engine from the flowable-7 compose profile; flip enabled when it runs.
    - id: engine-7
      name: "Engine 7 (Flowable 7.x)"
      base-url: "${INSPECTOR_ENGINE_7_BASE_URL:http://localhost:8083/flowable-rest/service}"
      environment: dev
      accent-color: "#8e44ad"
      enabled: false
      mode: read-write
      auth:
        type: basic
        username: rest-admin
        password-ref: ENGINE_7_PASSWORD
      timeouts:
        connect-ms: 2000
        read-ms: 10000
        write-ms: 10000
      max-page-size: 200
      dlq-scan-cap: 5000
