# Self-contained DEMO stack for the Process Inspector, published behind the hp04 cloud
# Traefik at https://pi.naumann.cloud.
#
#   docker/deploy-demo.sh [edge|sha-<short7>]     # resolves+pins the digest, then deploys
#
# `backend`/`frontend` are pinned by DIGEST (issue #92), never a floating tag or a local
# build — see docker/DEMO-DEPLOY.md for the deploy/rollback mechanics.
#
# Topology (one public origin, everything else internal):
#   Traefik ──(discovery net)──▶ frontend (nginx: SPA + /api reverse-proxy)
#                                     │ internal net
#                                     ▼
#                                  backend (BFF) ──▶ engine-a / engine-b (Flowable 6.8, REST)
#                                     │
#                                     ▼  postgres (audit / notes / bulk store)
#   seed (one-shot) deploys the demo processes + starts one instance per status arc.
#
# Only `frontend` is exposed; the BFF, engines and DB have NO host ports and never touch the
# discovery network. Sign in with the ladder users viewer/responder/operator/admin
# (password ${INSPECTOR_DEV_PASSWORD:-dev}).
#
# Overridable via the shell env or `--env-file docker/.env.demo`:
#   NAUMANN_CLOUD, PI_SUBDOMAIN, INSPECTOR_DEV_PASSWORD, POSTGRES_PASSWORD
#
# The two demo engines keep the flowable-rest image's well-known default creds
# (rest-admin / test) — seed.sh and the BFF below both expect them; they are throwaway
# in-network engines with no host port, so this is not a real secret.
name: process-inspector-demo

services:
  engine-a:
    image: flowable/flowable-rest:6.8.0
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test
    networks: [internal]
    restart: unless-stopped

  engine-b:
    image: flowable/flowable-rest:6.8.0
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test
    networks: [internal]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=inspector
      - POSTGRES_USER=inspector
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-inspector}
    volumes:
      - inspector-demo-pgdata:/var/lib/postgresql/data
      # Docker-native backups (issue #201-followup): a custom pg_hba.conf, extending the
      # upstream image's own generated default with a `replication` entry that trusts the
      # internal docker network under the SAME password requirement the image's existing
      # catch-all `host all all all scram-sha-256` rule already applies to ordinary
      # connections. Needed because `audit-basebackup` (pg_basebackup) and `wal-receiver`
      # (pg_receivewal) now connect over the NETWORK from their own containers, not via a
      # local docker-exec connection — verified empirically that the upstream default fails
      # closed for a network replication connection without this. See
      # docker/backup/postgres/pg_hba-demo.conf's header for the full rationale.
      - ./backup/postgres/pg_hba-demo.conf:/etc/postgresql-custom/pg_hba.conf:ro
    # NOT applied by a routine `docker compose up -d` reconciliation on its own — `command:`
    # only takes effect on a container RECREATE (a Postgres restart, however triggered).
    # Activating this against the LIVE demo container is a separate, explicit, human-run step
    # (see deploy/README.md's "Activating Docker-native backups" and docs/RUNBOOK.md).
    #   docker compose -f docker/docker-compose.demo.yml up -d postgres   # recreates + restarts Postgres
    #
    # issue #201-followup — SUPERSEDES issue #201's archive_mode/archive_command WAL-archiving
    # config (removed below): continuous WAL capture now happens via the `wal-receiver`
    # service's `pg_receivewal` (replication-protocol streaming, driven purely from
    # `wal_level=replica` — archive_mode/archive_command are NOT needed for that mechanism,
    # which is the whole point of the switch; see docker/backup/wal-receiver/entrypoint.sh).
    # wal_level=replica is `postgres:16-alpine`'s own compiled-in default already (verified
    # against a running 16.14 instance: `SHOW wal_level` → `replica`) — sufficient for
    # `pg_basebackup`/`pg_receivewal` without a separate `logical` bump this app doesn't need
    # (no logical-replication consumer exists). Pinned explicitly anyway so this file stays
    # correct even if a future base-image change ever lowered the compiled-in default.
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - hba_file=/etc/postgresql-custom/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U inspector -d inspector"]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [internal]
    restart: unless-stopped

  audit-backup:
    # Docker-native nightly LOGICAL backup (issue #201-followup) — supersedes
    # deploy/backup-audit-db.sh + deploy/systemd/pi-audit-backup.* for this compose-based demo
    # deployment (see those files' own SUPERSEDED headers + deploy/README.md). Runs `pg_dump`
    # over the NETWORK against `postgres:5432` (PGHOST/PGUSER/PGPASSWORD/PGDATABASE below —
    # standard libpq env vars pg_dump reads natively), NOT `docker exec`. Scheduled by busybox
    # crond (confirmed present in postgres:16-alpine — see
    # docker/backup/audit-backup/entrypoint.sh) at the same 02:30 UTC cadence as the systemd
    # timer it replaces. On-demand/manual run:
    #   docker compose -f docker/docker-compose.demo.yml run --rm audit-backup /scripts/backup-once.sh
    image: postgres:16-alpine
    environment:
      - PGHOST=postgres
      - PGUSER=inspector
      - PGPASSWORD=${POSTGRES_PASSWORD:-inspector}
      - PGDATABASE=inspector
      - PI_BACKUP_RETENTION_DAYS=35
    volumes:
      - ./backup/audit-backup:/scripts:ro
      - inspector-logical-dumps:/dumps
    entrypoint: ["/scripts/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  audit-basebackup:
    # Docker-native weekly PHYSICAL base backup (issue #201-followup) — supersedes
    # deploy/basebackup-audit-db.sh + deploy/systemd/pi-audit-basebackup.*. Runs
    # `pg_basebackup` over the NETWORK (same PGHOST/PGUSER/PGPASSWORD as `audit-backup`),
    # requires the `postgres` service's pg_hba override above (a plain network replication
    # connection is refused by the upstream image's default pg_hba.conf — verified
    # empirically). Sunday 04:00 UTC, same cadence as the systemd timer it replaces.
    # On-demand/manual run:
    #   docker compose -f docker/docker-compose.demo.yml run --rm audit-basebackup /scripts/basebackup-once.sh
    image: postgres:16-alpine
    environment:
      - PGHOST=postgres
      - PGUSER=inspector
      - PGPASSWORD=${POSTGRES_PASSWORD:-inspector}
      - PI_BASEBACKUP_RETENTION_COUNT=3
    volumes:
      - ./backup/audit-basebackup:/scripts:ro
      - inspector-basebackups:/basebackups
    entrypoint: ["/scripts/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  wal-receiver:
    # Docker-native continuous WAL capture (issue #201-followup) — supersedes issue #201's
    # archive_mode/archive_command mechanism (removed from the `postgres` service above).
    # Streams the replication protocol via `pg_receivewal` against `postgres:5432`, backed by
    # a permanent physical replication slot so Postgres retains WAL for as long as this
    # service is down (proven safe to restart — see docker/backup/wal-receiver/entrypoint.sh's
    # header and this PR's kill/restart rehearsal notes in docs/IMPLEMENTATION-PLAN.md).
    image: postgres:16-alpine
    environment:
      - PGHOST=postgres
      - PGUSER=inspector
      - PGPASSWORD=${POSTGRES_PASSWORD:-inspector}
      - PI_WAL_SLOT=wal_receiver
    volumes:
      - ./backup/wal-receiver:/scripts:ro
      - inspector-wal-archive:/wal-archive
    entrypoint: ["/scripts/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  backend:
    # Pinned by digest (issue #92) — never a floating tag, so what's running is always
    # attributable to one exact build. Set/updated by `docker/deploy-demo.sh`, never by hand.
    image: ghcr.io/x3kcl/process-inspector-bff@${PI_BFF_DIGEST:?PI_BFF_DIGEST is unset — run docker/deploy-demo.sh, see docker/DEMO-DEPLOY.md}
    environment:
      - SERVER_PORT=8080
      # Trust Traefik's X-Forwarded-* (scheme/host) after TLS termination.
      - SERVER_FORWARD_HEADERS_STRATEGY=framework
      # BFF-owned Postgres (Flyway + audit/notes/bulk store).
      - INSPECTOR_DB_URL=jdbc:postgresql://postgres:5432/inspector
      - INSPECTOR_DB_USER=inspector
      - INSPECTOR_DB_PASSWORD=${POSTGRES_PASSWORD:-inspector}
      # Point the two demo engines at their in-network hostnames. These are per-value
      # placeholders in application.yml — NOT indexed list binding, which would drop the
      # engines' id/environment/auth and fail startup.
      - INSPECTOR_ENGINE_A_BASE_URL=http://engine-a:8080/flowable-rest/service
      - INSPECTOR_ENGINE_B_BASE_URL=http://engine-b:8080/flowable-rest/service
      - ENGINE_A_PASSWORD=test
      - ENGINE_B_PASSWORD=test
      # Demo sign-in ladder password (dev auth chain; oidc profile is off here).
      - INSPECTOR_DEV_PASSWORD=${INSPECTOR_DEV_PASSWORD:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  frontend:
    # Pinned by digest (issue #92) — see the `backend` service above for the rationale.
    image: ghcr.io/x3kcl/process-inspector-web@${PI_WEB_DIGEST:?PI_WEB_DIGEST is unset — run docker/deploy-demo.sh, see docker/DEMO-DEPLOY.md}
    depends_on: [backend]
    networks: [internal, discovery]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # The frontend is on TWO networks (internal + the proxy net), so Traefik must be told
      # the EXACT real network name to reach nginx on — the hp04 proxy net is `docker_discovery`
      # (the `docker` compose project's `discovery` network). A single-network service can omit
      # this; a multi-network one cannot, or Traefik may pick the unreachable internal IP.
      - "traefik.docker.network=docker_discovery"
      - "traefik.http.services.process-inspector.loadbalancer.server.port=80"
      ### Routing
      - "traefik.http.routers.process-inspector.entrypoints=websecure"
      - "traefik.http.routers.process-inspector.rule=Host(`${PI_SUBDOMAIN:-pi}.${NAUMANN_CLOUD:-naumann.cloud}`)"
      - "traefik.http.routers.process-inspector.tls.certresolver=mytlschallenge"
      ### Security headers.
      # HSTS (S5): raised from the near-useless 5 min to 24 h now that pi.naumann.cloud runs a
      # stable auto-renewing Let's Encrypt cert — long enough to actually resist an SSL-strip,
      # short enough that a transient cert incident self-heals within a DAY (a browser lockout
      # that can't be click-through'd). Still DELIBERATELY NO stsPreload / stsIncludeSubdomains:
      # those are near-irreversible and preload can lock the whole naumann.cloud registrable
      # domain — raise those only after a long soak. hp04 house style keeps the longer max-age.
      - "traefik.http.routers.process-inspector.middlewares=pi-header"
      - "traefik.http.middlewares.pi-header.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.pi-header.headers.stsSeconds=86400"
      - "traefik.http.middlewares.pi-header.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.pi-header.headers.browserXssFilter=true"
      - "traefik.http.middlewares.pi-header.headers.customRequestHeaders.X-Forwarded-Proto=https"

  # One-shot: wait for both engines, then deploy the demo processes + seed one instance per
  # status arc (COMPLETED / FAILED / RETRYING / SUSPENDED / ACTIVE / timer / sub-process).
  # REST-only (CLAUDE.md iron rule) — never touches ACT_* tables. Exits 0 when done.
  seed:
    image: alpine:3.20
    depends_on: [engine-a, engine-b]
    volumes:
      - ./:/seed:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache bash curl python3 >/dev/null
        for e in engine-a engine-b; do
          url="http://$$e:8080/flowable-rest/service"
          echo "waiting for $$e ..."
          until curl -sf -u "rest-admin:test" -o /dev/null "$$url/management/engine"; do sleep 3; done
          bash /seed/seed.sh "$$url"
        done
        echo "demo seed complete."
    networks: [internal]
    restart: "no"

volumes:
  inspector-demo-pgdata:
  # Docker-native backup storage (issue #201-followup) — named volumes, NOT host
  # bind-mounts: no host directory to create/chown, no sudo needed. See deploy/README.md.
  inspector-logical-dumps:      # audit-backup's nightly pg_dump output + .sha256 sidecars
  inspector-basebackups:        # audit-basebackup's weekly pg_basebackup output + sidecars
  inspector-wal-archive:        # wal-receiver's continuously streamed WAL segments

networks:
  internal:
    driver: bridge
  # The shared Traefik proxy network, created outside this stack. On hp04 its real Docker
  # name is `docker_discovery` (owned by the `docker` compose project); we attach by that
  # name but keep the local alias `discovery`.
  discovery:
    external: true
    name: docker_discovery
