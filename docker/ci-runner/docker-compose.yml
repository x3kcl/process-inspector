      PI_PG_PORT: "5465"
      PI_BFF_PORT: "8386"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/flapci/ci-runner-work-s4:/home/flapci/ci-runner-work-s4
