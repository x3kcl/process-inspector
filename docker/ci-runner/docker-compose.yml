      PI_ENGINE_A_PORT: "8291"
      PI_ENGINE_B_PORT: "8292"
      PI_ENGINE_7_PORT: "8293"
      PI_ENGINE_LEGACY_PORT: "8294"
      PI_PG_PORT: "5455"
      PI_BFF_PORT: "8286"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/flapci/ci-runner-work-s3:/home/flapci/ci-runner-work-s3
      - toolcache-s3:/opt/hostedtoolcache

  runner-s4:
