      - /home/flapci/ci-runner-work-s6:/home/flapci/ci-runner-work-s6
      - toolcache-s6:/opt/hostedtoolcache

volumes:
  toolcache-s1:
  toolcache-s2:
  toolcache-s3:
  toolcache-s4:
  toolcache-s5:
  toolcache-s6:
