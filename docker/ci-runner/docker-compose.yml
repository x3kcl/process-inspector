      PI_ENGINE_B_PORT: "8492"
      PI_ENGINE_7_PORT: "8493"
      PI_ENGINE_LEGACY_PORT: "8494"
      PI_PG_PORT: "5475"
      PI_BFF_PORT: "8486"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/flapci/ci-runner-work-s5:/home/flapci/ci-runner-work-s5
