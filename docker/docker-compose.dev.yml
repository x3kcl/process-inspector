# Dev harness for the Process Inspector BFF.
#
# Profiles:
#   flowable-6  — two independent Flowable 6.8 REST engines (:8081/:8082), the default
#                 dev pair. Activated by default via docker/.env (COMPOSE_PROFILES=flowable-6),
#                 so the doctrinal `docker compose -f docker/docker-compose.dev.yml up -d`
#                 keeps working unchanged.
#   flowable-7  — one Flowable 7.x REST engine (:8083) to exercise the Spring Boot 3 /
#                 Jakarta capability cliffs against a modern engine.
#   legacy      — one pre-6.4 engine (:8084, Flowable 6.3.1) so the capability cliffs
#                 (change-state 6.4+, migration 6.5+, external-worker/scopeType 6.8+)
#                 are exercised against an engine that really lacks them.
#   postgres    — the BFF's own database (M4: audit log, notes, protected instances).
#                 In the default profile set since M4: the backend runs Flyway
#                 (V1__init.sql) + ddl-auto=validate against it at startup.
#
# docker/.env must never contain secrets — it only selects default profiles.
# Default credentials of the flowable/flowable-rest images: rest-admin / test
#
# Explicit project name: without it compose derives "docker" from the directory name,
# which collides with any other compose project living in a directory called docker/.
name: process-inspector
services:
  engine-a:
    image: flowable/flowable-rest:6.8.0
    profiles: ["flowable-6"]
    ports:
      # Host port is env-overridable (default = the doctrinal dev port) so a self-hosted
      # runner can bind a free port without colliding with an already-up dev/demo stack
      # on the same Docker daemon. Dev/local keep 8081 via the default.
      - "${PI_ENGINE_A_PORT:-8081}:8080"
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test

  engine-b:
    image: flowable/flowable-rest:6.8.0
    profiles: ["flowable-6"]
    ports:
      - "${PI_ENGINE_B_PORT:-8082}:8080"
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test

  engine-7:
    image: flowable/flowable-rest:7.1.0
    profiles: ["flowable-7"]
    ports:
      - "${PI_ENGINE_7_PORT:-8083}:8080"
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test

  engine-legacy:
    image: flowable/flowable-rest:6.3.1
    profiles: ["legacy"]
    ports:
      - "${PI_ENGINE_LEGACY_PORT:-8084}:8080"
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "${PI_PG_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=inspector
      - POSTGRES_USER=inspector
      - POSTGRES_PASSWORD=inspector
    volumes:
      - inspector-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U inspector -d inspector"]
      interval: 5s
      timeout: 3s
      retries: 24

volumes:
  inspector-pgdata:
