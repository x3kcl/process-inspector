# Two independent Flowable REST engines = a realistic multi-engine playground.
# Default credentials of the flowable/flowable-rest image: rest-admin / test
services:
  engine-a:
    image: flowable/flowable-rest:6.8.0
    ports:
      - "8081:8080"
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test

  engine-b:
    image: flowable/flowable-rest:6.8.0
    ports:
      - "8082:8080"
    environment:
      - FLOWABLE_REST_APP_ADMIN_USER-ID=rest-admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test
