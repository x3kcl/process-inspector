# pg_hba-demo.conf — the demo Postgres's client-auth rules, EXTENDED from
# postgres:16-alpine's own auto-generated default (verified by inspecting a fresh instance's
# generated $PGDATA/pg_hba.conf) with ONE addition: a `replication` entry that matches the
# existing `host all all all scram-sha-256` catch-all's trust model (any source, password
# required) instead of the upstream image's default of trusting replication connections ONLY
# from 127.0.0.1/::1 (i.e. only a `docker exec`-based local connection).
#
# Why this file exists at all (issue #201-followup, Docker-native backups): `audit-basebackup`
# (pg_basebackup) and `wal-receiver` (pg_receivewal) both connect over the replication
# protocol from OTHER containers on the `internal` bridge network, not from inside the
# Postgres container itself. Verified empirically against a disposable postgres:16-alpine
# instance: a plain network pg_basebackup/pg_receivewal against the image's stock pg_hba.conf
# fails closed with `no pg_hba.conf entry for replication connection from host "..."` — the
# upstream image ships `local`/127.0.0.1/::1-only replication trust by design. This file is
# the minimal fix: same scram-sha-256 password requirement the image already applies to
# ordinary connections, just extended to the `replication` pseudo-database too. It is NOT a
# wider trust boundary than what already exists — `postgres` has no host port and never
# leaves the `internal` docker network either way.
#
# Wired in via docker-compose.demo.yml's `postgres` service: mounted read-only + selected with
# `-c hba_file=/etc/postgresql-custom/pg_hba.conf` in `command:`.
#
# IMPORTANT — same activation caveat as issue #201's own archive_mode/archive_command change:
# `hba_file` is read at postmaster start (and on SIGHUP/`pg_reload_conf()` for ordinary
# pg_hba.conf edits, but SWITCHING to a *different* hba_file path is itself a postmaster-context
# change) — a LIVE container needs a `docker compose up -d postgres` recreate for this to take
# effect, exactly like the archive_mode change it now travels alongside. Not applied live by
# this PR — see deploy/README.md.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     trust
# IPv4/IPv6 local connections:
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
# Local replication connections (kept from the upstream default — a `docker exec` into the
# postgres container itself still needs no password).
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust

# Upstream image's own catch-all for ordinary connections (unchanged).
host    all             all             all                     scram-sha-256
# THE ADDITION: same trust model, extended to the replication protocol, for
# audit-basebackup / wal-receiver connecting from elsewhere on the `internal` network.
host    replication     all             all                     scram-sha-256
