# Versioned image release (OPERATIONS §5): pushing a `v*` tag builds the two shipping
# images and publishes them on GitHub, then creates a GitHub Release with the quick-start
# compose bundle attached. Runs on the self-hosted runner — zero paid Actions minutes;
# ghcr.io storage/bandwidth is free for public packages.
#
#   git tag v1.2.3 && git push origin v1.2.3
#
# Images (linux/amd64; the runner builds natively — no qemu):
#   ghcr.io/x3kcl/process-inspector-bff   (Dockerfile          — Spring Boot BFF)
#   ghcr.io/x3kcl/process-inspector-web   (frontend/Dockerfile — nginx: SPA + /api proxy)
# Tags: {version} and {major}.{minor} + `latest` for stable releases; a prerelease tag
# (v1.2.3-rc1) publishes only its literal version and never moves latest.
#
# ONE-TIME after the first publish: flip both ghcr packages to PUBLIC visibility
# (repo → Packages → package settings) — new packages default to private.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push to ghcr.io

concurrency:
  group: release-${{ github.ref }}

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: BFF image tags
        id: meta-bff
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-bff
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build + push BFF image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-bff.outputs.tags }}
          labels: ${{ steps.meta-bff.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Web image tags
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build + push web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GitHub Release (quick-start compose attached)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # v1.2.3-rc1 / -beta etc. are marked prerelease automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: docker/docker-compose.release.yml
          body: |
            Pull the images (set the version you want, or omit `PI_VERSION` for `latest`):
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/docker-compose.release.yml
            PI_VERSION=${{ github.ref_name }} docker compose -f docker-compose.release.yml up -d
            ```
            Images: `ghcr.io/${{ github.repository }}-bff` · `ghcr.io/${{ github.repository }}-web`
