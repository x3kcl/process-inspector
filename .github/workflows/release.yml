# Versioned image release (OPERATIONS §5): pushing a `v*` tag builds the two shipping
# images and publishes them on GitHub, then creates a GitHub Release with the quick-start
# compose bundle attached. Runs on the self-hosted runner — zero paid Actions minutes;
# ghcr.io storage/bandwidth is free for public packages.
#
#   git tag v1.2.3 && git push origin v1.2.3
#
# Also callable as a reusable workflow (workflow_call + tag input) so cut-release.yml can
# publish a tag it just created: a GITHUB_TOKEN-pushed tag never fires this file's push
# trigger (Actions suppresses token-initiated events), so the button path must CALL it.
#
# Images (linux/amd64; the runner builds natively — no qemu):
#   ghcr.io/x3kcl/process-inspector-bff   (Dockerfile          — Spring Boot BFF)
#   ghcr.io/x3kcl/process-inspector-web   (frontend/Dockerfile — nginx: SPA + /api proxy)
# Tags: {version} and {major}.{minor} + `latest` for stable releases; a prerelease tag
# (v1.2.3-rc1) publishes only its literal version and never moves latest.
#
# ONE-TIME after the first publish: flip both ghcr packages to PUBLIC visibility
# (repo → Packages → package settings) — new packages default to private.
name: release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Existing v* tag to build and release (cut-release.yml passes the tag it just pushed)"
        required: true
        type: string

permissions:
  contents: write # create the GitHub Release
  packages: write # push to ghcr.io

concurrency:
  group: release-${{ inputs.tag || github.ref }}

# On a tag push, inputs is empty and the tag IS the ref; via workflow_call the ref is the
# caller's branch (main), so the tag must come from the input.
env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Explicit so the workflow_call path builds the tagged commit, not the caller's ref.
          ref: ${{ env.RELEASE_TAG }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: BFF image tags
        id: meta-bff
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-bff
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
      - name: Build + push BFF image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-bff.outputs.tags }}
          labels: ${{ steps.meta-bff.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Web image tags
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
      - name: Build + push web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GitHub Release (quick-start compose attached)
        uses: softprops/action-gh-release@v2
        with:
          # Explicit so the workflow_call path releases the input tag, not the caller's ref.
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          # v1.2.3-rc1 / -beta etc. are marked prerelease automatically.
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: docker/docker-compose.release.yml
          body: |
            Pull the images (set the version you want, or omit `PI_VERSION` for `latest`):
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/docker-compose.release.yml
            PI_VERSION=${{ env.RELEASE_TAG }} docker compose -f docker-compose.release.yml up -d
            ```
            Images: `ghcr.io/${{ github.repository }}-bff` · `ghcr.io/${{ github.repository }}-web`
