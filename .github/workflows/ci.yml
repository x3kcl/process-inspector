# Merge gates (OPERATIONS §8): lint, unit ladder, frontend build, image build, and the
# dockerized-engine integration matrix. Zero-flake doctrine: matrix legs gate on
# docker/smoke-test.sh (bounded readiness probes) before Maven touches an engine.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Spotless check
        working-directory: backend
        run: mvn -B spotless:check
      - name: Security audit (env-ref secrets doctrine)
        run: ./scripts/security-audit.sh

  unit:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Unit ladder (rungs 1-3 + ArchUnit sleep ban)
        working-directory: backend
        run: mvn -B test

  frontend:
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    services:
      # The OpenAPI drift gate boots the REAL BFF. Engines may be absent (health degrades,
      # boot succeeds — ARCH §2.2), but Postgres is a hard boot dependency (Flyway +
      # ddl-auto=validate), so it runs as a service. Container-port-only mapping: Docker
      # assigns a random free HOST port (read via job.services below), so concurrent
      # frontend jobs on different runner slots never collide and no slot entry is needed.
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inspector
          POSTGRES_USER: inspector
          POSTGRES_PASSWORD: inspector
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U inspector"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      # Runner slots (docker/ci-runner/docker-compose.yml) carry a disjoint port block as
      # container env so concurrent jobs never collide; slot-1 values are the fallback for
      # a slot-less runner.
      - name: Resolve the slot port namespace
        working-directory: .
        run: echo "BFF_PORT=${PI_BFF_PORT:-8086}" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (ESLint strict-type-checked — hard failure, SPEC §10)
        run: npm run lint
      - name: Format check (Prettier — hard failure, SPEC §10)
        run: npm run format:check
      - name: Unit tests (vitest)
        run: npm test
      - name: Build (watermark + no-enterprise guards + tsc + vite)
        run: npm run build
      # ---- OpenAPI drift gate (R-SEM-15): cross-language drift is a CI failure. ----
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build BFF jar (tests belong to the unit/integration jobs)
        working-directory: backend
        run: mvn -B -DskipTests package
      - name: Boot BFF in the background (no engines — degraded health is expected)
        working-directory: backend
        env:
          # password-refs must resolve; the engines they authenticate against are absent.
          ENGINE_A_PASSWORD: unused-in-ci
          ENGINE_B_PASSWORD: unused-in-ci
          # Slot remap: the BFF on the runner slot's PI_BFF_PORT (dev default is 8085) and
          # its DB on the service's Docker-assigned host port, so concurrent dev stacks AND
          # concurrent CI jobs on other slots all coexist.
          SERVER_PORT: ${{ env.BFF_PORT }}
          INSPECTOR_DB_URL: jdbc:postgresql://localhost:${{ job.services.postgres.ports['5432'] }}/inspector
        run: |
          JAR=$(ls target/*.jar | head -1)
          nohup java -jar "$JAR" > /tmp/bff.log 2>&1 &
          echo $! > /tmp/bff.pid
      - name: Wait for /v3/api-docs (bounded)
        run: |
          for _ in $(seq 1 90); do
            curl -fsS "http://localhost:${BFF_PORT}/v3/api-docs" > /dev/null && exit 0
            sleep 2
          done
          echo "::error::BFF did not serve /v3/api-docs within 180s"
          tail -200 /tmp/bff.log
          exit 1
      - name: Regenerate the API contract from the running BFF
        env:
          INSPECTOR_BFF_URL: http://localhost:${{ env.BFF_PORT }}
        run: npm run gen:api
      - name: Drift gate — committed schema must match the live contract
        run: |
          git diff --exit-code -- src/api/schema.d.ts || {
            echo "::error::frontend/src/api/schema.d.ts is stale — run the BFF, 'npm run gen:api', and commit the regenerated schema (never hand-edit it)."
            exit 1
          }
      - name: Dump BFF log
        if: failure()
        run: tail -200 /tmp/bff.log || true
      - name: Reap the background BFF
        # Defensive hygiene: the EPHEMERAL runner container is torn down and recreated per
        # job (docker/ci-runner: EPHEMERAL=true + restart:unless-stopped), so a leaked BFF
        # already cannot survive into the next run — this reaps it within-job regardless of
        # how the job exited, keeping the host :8086 free the moment the frontend job ends.
        if: always()
        run: kill "$(cat /tmp/bff.pid 2>/dev/null)" 2>/dev/null || true

  docker:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build BFF image (multi-stage, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    runs-on: self-hosted
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: flowable-6
            itClass: EngineHealthIT,SearchServiceIT,TriageAggregationIT,TriageCmmnScopeIT,CaseDetailIT,KwayPagingIT
          - profile: flowable-7
            itClass: EngineHealth7IT,Search7IT,Triage7IT,ExternalWorkerJob7IT,Kway7IT
          - profile: legacy
            itClass: EngineHealthLegacyIT,SearchLegacyIT,TriageLegacyIT,ExternalWorkerJobLegacyIT,TriageCmmnScopeLegacyIT
    env:
      # Job-level so EVERY compose invocation (up/exec/logs) sees the same profile set —
      # CLI --profile flags would scope only the command they're passed to, leaving
      # logs/exec on the docker/.env default.
      COMPOSE_PROFILES: "${{ matrix.profile }},postgres"
    steps:
      - uses: actions/checkout@v4
      # Self-hosted runners share hp04's Docker daemon with a live demo + interactive dev
      # stacks, so every published port is remapped off the dev defaults — and each runner
      # SLOT (docker/ci-runner/docker-compose.yml) carries its own disjoint remap block as
      # container env so concurrent jobs on different slots never collide either. The
      # compose file, smoke-test.sh, seed.sh and the IT base-urls all read PI_*_PORT from
      # the process environment; slot-1 values are the fallback for a slot-less runner.
      # CI_PROJECT: distinct per-slot compose project (never the dev "process-inspector")
      # so container names can't clash and teardown only removes THIS job's containers.
      - name: Resolve the slot port namespace
        run: |
          {
            echo "PI_ENGINE_A_PORT=${PI_ENGINE_A_PORT:-8091}"
            echo "PI_ENGINE_B_PORT=${PI_ENGINE_B_PORT:-8092}"
            echo "PI_ENGINE_7_PORT=${PI_ENGINE_7_PORT:-8093}"
            echo "PI_ENGINE_LEGACY_PORT=${PI_ENGINE_LEGACY_PORT:-8094}"
            echo "PI_PG_PORT=${PI_PG_PORT:-5435}"
            echo "INSPECTOR_DB_URL=jdbc:postgresql://localhost:${PI_PG_PORT:-5435}/inspector"
            echo "CI_PROJECT=pi-ci-s${PI_CI_SLOT:-1}-${{ matrix.profile }}"
          } >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # Mitigates Docker Hub 429s on shared runner NAT pools; skips cleanly when the
      # secrets are absent (forks, or before they're configured).
      - name: Docker Hub login (rate-limit mitigation)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Persistent runner: a prior interrupted run may have left CI's own containers behind.
      # Scoped to $CI_PROJECT — never touches the dev/demo projects.
      - name: Pre-clean CI harness residue
        run: docker compose -p "$CI_PROJECT" -f docker/docker-compose.dev.yml down -v --remove-orphans || true
      - name: Boot harness (${{ matrix.profile }} + postgres)
        run: docker compose -p "$CI_PROJECT" -f docker/docker-compose.dev.yml up -d
      - name: Wait for engines and postgres (bounded)
        run: bash docker/smoke-test.sh ${{ matrix.profile }}
      - name: Seed demo processes (REST-only, idempotent)
        run: bash docker/seed.sh
      - name: Integration tests (failsafe, ${{ matrix.itClass }})
        working-directory: backend
        run: mvn -B verify -Dit.test=${{ matrix.itClass }} -Dskip.surefire.tests=true
      - name: Dump harness logs
        if: failure()
        run: docker compose -p "$CI_PROJECT" -f docker/docker-compose.dev.yml logs --no-color --timestamps
      # Always tear down CI's own project so the persistent runner leaves no residue and
      # frees the remapped ports for the next leg. Never touches dev/demo (different project).
      - name: Tear down CI harness
        if: always()
        run: docker compose -p "$CI_PROJECT" -f docker/docker-compose.dev.yml down -v --remove-orphans || true
