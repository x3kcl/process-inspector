# Continuous builds (OPERATIONS §5): after every GREEN ci run on main, publish the two
# shipping images as :edge + :sha-<short7> to BOTH ghcr.io and Docker Hub. Triggered by
# workflow_run — not push — so a red main never ships an image (the green-main doctrine
# applied to publishing). Consumers pinning a released version are never moved by these
# tags; versioned releases are release.yml / cut-release.yml.
# Requires the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets (see release.yml header).
name: publish-edge

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  packages: write

# A newer green main supersedes an in-flight edge build.
concurrency:
  group: publish-edge
  cancel-in-progress: true

jobs:
  edge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      # The commit the green ci run actually validated — NOT github.sha (which is the
      # default-branch head at event-delivery time and can already be newer).
      GREEN_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.GREEN_SHA }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Short SHA
        id: src
        run: echo "short=$(cut -c1-7 <<< "$GREEN_SHA")" >> "$GITHUB_OUTPUT"

      - name: BFF image tags
        id: meta-bff
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-bff
            docker.io/x3kcl/process-inspector-bff
          tags: |
            type=raw,value=edge
            type=raw,value=sha-${{ steps.src.outputs.short }}
      - name: Build + push BFF image
        id: build-bff
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-bff.outputs.tags }}
          labels: ${{ steps.meta-bff.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Web image tags
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-web
            docker.io/x3kcl/process-inspector-web
          tags: |
            type=raw,value=edge
            type=raw,value=sha-${{ steps.src.outputs.short }}
      - name: Build + push web image
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record digests (issue #92 — always attributable to a SHA, never a floating tag)
        run: |
          {
            echo "### edge / sha-${{ steps.src.outputs.short }} image digests ($GREEN_SHA)"
            echo "- BFF: \`ghcr.io/${{ github.repository }}-bff@${{ steps.build-bff.outputs.digest }}\`"
            echo "- web: \`ghcr.io/${{ github.repository }}-web@${{ steps.build-web.outputs.digest }}\`"
            echo
            echo "Pin the demo deploy to these with \`docker/deploy-demo.sh edge\` — see docker/DEMO-DEPLOY.md."
          } | tee -a "$GITHUB_STEP_SUMMARY"
