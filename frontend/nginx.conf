# Serves the built Process Inspector SPA and reverse-proxies the BFF, so the whole demo
# is one origin (pi.naumann.cloud) behind Traefik. The browser only ever talks to /api
# (the api client's baseUrl is '/'); the BFF fans out to the Flowable engines internally.

# Honour the scheme Traefik terminated TLS on. Traefik forwards X-Forwarded-Proto=https to
# us over plain http; only fall back to our own $scheme when the header is absent.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve `backend` at request time via Docker's embedded DNS (127.0.0.11) instead of
    # once at boot. Two wins: nginx starts even if the BFF container is still coming up, and
    # it survives a BFF restart that changes the container IP (no stale-upstream 502s). The
    # variable in proxy_pass is what defers resolution — a literal host would pin the IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bff http://backend:8080;

    # gzip the static bundle; the JS/CSS is the bulk of the payload.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The app's ONE live channel (live-ui-sse): a long-lived Server-Sent Events stream.
    # It must never be buffered or timed out, or the browser sees a stalled connection.
    location = /api/bulk/events {
        # $request_uri keeps the exact path+query — a bare variable proxy_pass would
        # forward the normalized $uri and silently drop query strings.
        proxy_pass $bff$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # Everything the SPA needs is same-origin under /api — Basic auth + the JSESSIONID the
    # SSE stream rides both stay first-party, so no CORS and no cookie SameSite friction.
    location /api/ {
        proxy_pass $bff$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
    }

    # Hashed build assets (#265): these URLs are content-addressed and NEVER SPA routes, so a
    # missing chunk (stale tab still referencing a pre-redeploy hash) must fail cleanly with a
    # 404 instead of falling through to the `location /` try_files and getting served
    # index.html with a 200 — that 200-HTML-for-a-.js-request is what turns a routine stale
    # chunk into the browser's cryptic "error loading dynamically imported module". The
    # content hash in the filename makes the asset immutable, so it's also safe to cache
    # forever (`Cache-Control: public, max-age=31536000, immutable`) — a new build never
    # reuses a hash.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # #265: index.html carries the asset manifest (which hashed chunks exist). Without an
    # explicit Cache-Control, browsers fall back to heuristic caching off Last-Modified/ETag
    # and can serve a stale shell on a plain navigation right after a redeploy, pointing at
    # chunks that no longer exist. no-cache forces a revalidation round-trip every time
    # (cheap — it's one small HTML file) while still allowing a 304 when nothing changed.
    # An exact-match location so it also wins over `location /` for the try_files internal
    # redirect to /index.html (exact matches take priority over prefix matches in nginx,
    # regardless of declaration order) — it must repeat the security headers below since
    # nginx's add_header inheritance stops as soon as a sibling/child location defines its
    # own add_header set.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), usb=(), payment=(), magnetometer=(), gyroscope=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # Client-side routing (React Router v7): unknown paths resolve to the SPA shell.
    location / {
        # S5 (R-OPS-16): MIRROR the BFF's security-header set on the SPA document + assets that nginx
        # serves DIRECTLY — otherwise the shell that loads bpmn-js/AG-Grid/CodeMirror ships with none
        # of them (the /api/* responses already carry the BFF's headers through the proxy, so these
        # live only here to avoid double-emitting on the proxied paths). CSP is the ENFORCING policy,
        # byte-identical to HttpHardeningProperties.DEFAULT_CSP. `always` so error/fallback responses
        # (404 → index.html) carry them too. Must never touch the bpmn.io watermark (R-GOV-05).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), usb=(), payment=(), magnetometer=(), gyroscope=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
